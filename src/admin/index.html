<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simorchip — Content Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
.media-mgr-btn{
  position:fixed;bottom:24px;right:24px;z-index:9000;
  background:#0a84ff;color:#fff;border:none;cursor:pointer;
  padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;
  box-shadow:0 4px 16px rgba(10,132,255,.4);transition:transform .2s,box-shadow .2s;
}
.media-mgr-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(10,132,255,.5);}

#mediaMgrOverlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
  animation:fadeIn .15s ease;
}
#mediaMgrOverlay.open{display:block;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#mediaMgrPanel{
  position:absolute;inset:16px;
  background:#0f0f10;border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 24px 64px rgba(0,0,0,.7);
}

#mediaMgrClose{
  position:absolute;top:14px;right:18px;z-index:1;
  background:rgba(255,255,255,.12);border:none;color:#f5f5f7;
  border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600;
  transition:background .15s;
}
#mediaMgrClose:hover{background:rgba(255,255,255,.22);}

#mediaMgrFrame{flex:1;border:none;width:100%;height:100%;}
</style>
</head>
<body>
<script src="https://unpkg.com/@sveltia/cms@^0.x/dist/sveltia-cms.js" type="module"></script>

<button class="media-mgr-btn" id="mediaMgrBtn">📁 Media Manager</button>

<div id="mediaMgrOverlay">
  <div id="mediaMgrPanel">
    <button id="mediaMgrClose">✕ Close</button>
    <iframe id="mediaMgrFrame" src="/admin/media.html"></iframe>
  </div>
</div>

<script>
const overlay = document.getElementById('mediaMgrOverlay');

document.getElementById('mediaMgrBtn').addEventListener('click', () => {
  overlay.classList.add('open');
});

document.getElementById('mediaMgrClose').addEventListener('click', () => {
  overlay.classList.remove('open');
});

overlay.addEventListener('click', e => {
  if (e.target === overlay) overlay.classList.remove('open');
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') overlay.classList.remove('open');
});

window.addEventListener('message', e => {
  if (e.data?.type !== 'media-selected') return;
  overlay.classList.remove('open');
  const url = e.data.url;

  const active = document.activeElement;
  if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
    const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
      window.HTMLInputElement.prototype, 'value'
    ).set;
    nativeInputValueSetter.call(active, url);
    active.dispatchEvent(new Event('input', { bubbles: true }));
    return;
  }

  navigator.clipboard.writeText(url).then(() => {
    alert(`Image URL copied to clipboard:\n${url}`);
  });
});
</script>
</body>
</html>
