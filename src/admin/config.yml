backend:
  name: github
  repo: Boyfriendishere/simorchip-docs
  branch: main
  base_url: https://simorchip-cms-auth.nake-design.workers.dev

media_folder: "src/_uploads"
public_folder: "/_uploads"

collections:
  - name: "home"
    label: "首頁 Banner"
    files:
      - name: "hero"
        label: "首頁 Hero 區塊"
        file: "src/_data/home.json"
        fields:
          - { label: "Hero 影片網址", name: "heroVideo", widget: "string" }
          - { label: "Hero 標籤文字", name: "heroKicker", widget: "string" }
          - { label: "公告標籤 (Tag)", name: "pillTag", widget: "string" }
          - { label: "公告文字", name: "pillText", widget: "string" }
          - { label: "主標題", name: "headline", widget: "string" }
          - { label: "主標題漸層字", name: "headlineGradWord", widget: "string" }
          - { label: "按鈕 1 文字", name: "cta1Text", widget: "string" }
          - { label: "按鈕 1 連結", name: "cta1Url", widget: "string" }
          - { label: "按鈕 2 文字", name: "cta2Text", widget: "string" }
          - { label: "按鈕 2 連結", name: "cta2Url", widget: "string" }

  - name: "news"
    label: "News 文章"
    folder: "src/news"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "發布日期", name: "date", widget: "datetime" }
      - { label: "封面圖", name: "cover", widget: "image", required: false }
      - { label: "摘要", name: "excerpt", widget: "text" }
      - { label: "內文", name: "body", widget: "markdown" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "news-article.njk" }

  - name: "products"
    label: "產品"
    folder: "src/products"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{name}}"
    filter:
      field: permalink
      value: false
    fields:
      - { label: "產品名稱", name: "name", widget: "string" }
      - label: "分類"
        name: "category"
        widget: "select"
        options:
          - { label: "SSD", value: "ssd" }
          - { label: "DRAM", value: "dram" }
          - { label: "GPU", value: "gpu" }
          - { label: "External", value: "ext" }
      - { label: "子分類 / Sub-band", name: "sub_band", widget: "string", required: false, hint: "例：NVIDIA — Entry Series · G / GT（留空則不顯示）" }
      - { label: "副標題 (卡片顯示)", name: "subtitle", widget: "string", hint: "例：PCIe Gen4x4 · M.2 2280 · NVMe" }
      - { label: "縮圖 URL", name: "thumbnail", widget: "image" }
      - { label: "縮圖 contain 模式", name: "thumb_contain", widget: "boolean", default: false, hint: "透明背景圖片（DRAM/外接）請勾選" }
      - { label: "Preview 頁面路徑", name: "preview_file", widget: "string", hint: "例：ssd/SSD120_preview.html" }
      - { label: "Copywriting 頁面路徑", name: "text_file", widget: "string", hint: "例：ssd/SSD120_text.html" }
      - { label: "Copywriting 備註", name: "text_note", widget: "string", required: false, hint: "例：共用 DDR3/4/5（留空則不顯示）" }
      - { label: "排列順序", name: "sort_order", widget: "number", default: 99 }
      - label: "規格表"
        name: "specs"
        widget: "list"
        required: false
        fields:
          - { label: "規格名稱", name: "label", widget: "string" }
          - { label: "規格值", name: "value", widget: "string" }
